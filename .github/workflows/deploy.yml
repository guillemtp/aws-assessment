name: terraform-ci

on:
  push:
    branches: ["master"]
  pull_request:

permissions:
  contents: read
  checks: write
  security-events: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      PROJECT_NAME: ${{ vars.PROJECT_NAME != '' && vars.PROJECT_NAME || (secrets.PROJECT_NAME != '' && secrets.PROJECT_NAME || 'aws-assessment') }}
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      CANDIDATE_EMAIL: ${{ vars.CANDIDATE_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      REPO_OWNER: ${{ vars.REPO_OWNER }}
      SNS_PUBLISH_ENABLED: "false"
      HAS_AWS_CREDS: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Fmt
        run: terraform -chdir=terraform fmt -recursive -check

      - name: Terraform Init (no backend)
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: tfsec security scan (SARIF, non-blocking)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          format: sarif
          sarif_file: terraform/tfsec.sarif
          soft_fail: true

      - name: Upload tfsec SARIF to Code Scanning
        if: ${{ always() && hashFiles('terraform/tfsec.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: terraform/tfsec.sarif
          category: tfsec

      - name: Configure AWS credentials (optional)
        if: ${{ env.HAS_AWS_CREDS == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate terraform.tfvars from environment
        run: make tfvars

      - name: Terraform Init (remote backend)
        run: |
          terraform -chdir=terraform init -reconfigure \
            -backend-config=backend.hcl \
            -backend-config="key=${{ env.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Plan (optional when secrets are set)
        run: |
          terraform -chdir=terraform plan \
            -input=false \
            -out=tfplan

      - name: Terraform Apply
        id: tf_apply
        run: terraform -chdir=terraform apply -input=false -auto-approve tfplan

      - name: Export Terraform Outputs
        run: terraform -chdir=terraform output -json > outputs.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run pytest e2e tests
        env:
          TEST_USERNAME: ${{ env.CANDIDATE_EMAIL }}
          TEST_PASSWORD: ${{ env.TEST_USER_PASSWORD }}
        run: |
          mkdir -p test-results
          pytest -s -vv tests \
            --outputs-json outputs.json \
            --auth-region "${AWS_REGION}" \
            --junitxml test-results/pytest.xml

      - name: Upload pytest report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: test-results/pytest.xml
          if-no-files-found: ignore

      - name: Publish pytest report
        uses: dorny/test-reporter@v1
        with:
          name: Pytest Results
          path: test-results/pytest.xml
          reporter: java-junit
          fail-on-error: false

      - name: Terraform Destroy (always)
        if: ${{ always() && steps.tf_apply.outcome != 'skipped' }}
        run: |
          terraform -chdir=terraform init -reconfigure \
            -backend-config=backend.hcl \
            -backend-config="key=${{ env.PROJECT_NAME }}/terraform.tfstate"
          terraform -chdir=terraform destroy \
            -input=false \
            -auto-approve
